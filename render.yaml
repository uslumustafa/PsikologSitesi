# Render.com otomatik yapılandırması (backend / Node.js API)
# Render bu dosyayı görünce servisi otomatik kurar. Gizli değerler (sync: false)
# ilk kurulumda Render panelinden elle girilir; repoda tutulmaz.
services:
  - type: web
    name: psikolog-onuruslu-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
