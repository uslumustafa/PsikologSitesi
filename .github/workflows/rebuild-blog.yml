name: Blog statik sayfalarını yeniden üret

# Admin panelinden yeni blog yazısı eklendiğinde Cloudflare'in indekslenebilir
# /blog/<slug>/ sayfaları kendiliğinden oluşmaz (commit'li statik dosya sunulur).
# Bu iş akışı canlı API'den yazıları çekip sayfaları + sitemap'i yeniden üretir,
# değişiklik varsa commit edip push eder → Cloudflare otomatik yayınlar.
#
# Tetikleyiciler:
#   • Manuel: GitHub > Actions > bu iş akışı > "Run workflow" (anında).
#   • Zamanlanmış: 6 saatte bir (yeni yazılar aynı gün yayına girer).

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

# Aynı anda tek çalışma yeter; üst üste binmeleri engelle.
concurrency:
  group: rebuild-blog
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v5

      - name: Node kur
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Blog sayfalarını üret (canlı API'den)
        # BLOG_API_URL verilmezse script production Render adresini kullanır.
        run: node scripts/build-blog.js

      - name: Değişiklik varsa commit + push
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog sitemap.xml
          if git diff --cached --quiet; then
            echo "Değişiklik yok — commit atlanıyor."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(blog): statik sayfaları ve sitemap'i yeniden üret [skip ci]"
            git push
            echo "✅ Güncellendi ve push'landı."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: IndexNow'a bildir (Bing/Yandex/DuckDuckGo)
        # [skip ci] yüzünden push tetiklemeli indexnow workflow'u bu commit için çalışmaz;
        # ping burada yapılır. Cloudflare'in yeni sayfaları yayınlaması için kısa bekleme var.
        if: steps.push.outputs.changed == 'true'
        run: |
          sleep 90
          bash scripts/indexnow-ping.sh
